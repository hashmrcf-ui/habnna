<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة — آمين ماسنجر</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: #060612;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, #1a0a3a 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, #0a1a3a 0%, transparent 60%);
    }
    .particles {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        radial-gradient(circle, #6C63FF22 1px, transparent 1px),
        radial-gradient(circle, #3B82F622 1px, transparent 1px);
      background-size: 50px 50px, 80px 80px;
      animation: particleMove 20s linear infinite;
    }
    @keyframes particleMove {
      0% { background-position: 0 0, 0 0; }
      100% { background-position: 50px 50px, 80px 80px; }
    }
    .card {
      position: relative; z-index: 10;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(108,99,255,0.25);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .shield {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #6C63FF, #3B82F6);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(108,99,255,0.4);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(108,99,255,0.4); }
      50% { box-shadow: 0 8px 48px rgba(108,99,255,0.7); }
    }
    h1 { font-size: 1.6rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 32px; }
    .warning {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 10px 16px;
      color: #f87171;
      font-size: 0.85rem;
      margin-bottom: 24px;
      text-align: right;
    }
    label { display: block; text-align: right; color: #aaa; font-size: 0.85rem; margin-bottom: 6px; }
    .input-wrap { position: relative; margin-bottom: 20px; }
    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff;
      font-size: 1rem;
      font-family: 'Tajawal', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      text-align: right;
    }
    input:focus { border-color: #6C63FF; background: rgba(108,99,255,0.08); }
    .eye-btn {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: #666; font-size: 18px;
    }
    button[type=submit] {
      width: 100%;
      background: linear-gradient(135deg, #6C63FF, #3B82F6);
      border: none;
      border-radius: 12px;
      padding: 14px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Tajawal', sans-serif;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button[type=submit]:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,99,255,0.4); }
    button[type=submit]:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }
    .error { color: #f87171; margin-top: 16px; font-size: 0.9rem; min-height: 20px; }
    .lock-warn { margin-top: 20px; color: #555; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="particles"></div>
  <div class="card">
    <div class="shield">🛡️</div>
    <h1>لوحة الإدارة</h1>
    <p class="subtitle">آمين ماسنجر — وصول مقيد</p>
    <div class="warning">⚠️ هذه المنطقة محمية. المحاولات الفاشلة مسجّلة.</div>
    <form id="loginForm">
      <div class="input-wrap">
        <label>كلمة مرور الأدمن</label>
        <input type="password" id="password" placeholder="••••••••••••" required autocomplete="current-password">
        <button type="button" class="eye-btn" onclick="togglePw()">👁</button>
      </div>
      <button type="submit" id="loginBtn">🔐 دخول آمن</button>
    </form>
    <div class="error" id="error"></div>
    <p class="lock-warn">🔒 تقفل تلقائياً بعد 2 ساعة من الدخول</p>
  </div>

  <script>
    function togglePw() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('error');
      btn.disabled = true;
      btn.textContent = '...جاري التحقق';
      err.textContent = '';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem('admin_token', data.token);
        window.location.href = '/admin/dashboard.html';
      } catch (ex) {
        err.textContent = ex.message;
        btn.disabled = false;
        btn.textContent = '🔐 دخول آمن';
      }
    });

    // Redirect if already logged in
    if (localStorage.getItem('admin_token')) {
      window.location.href = '/admin/dashboard.html';
    }
  </script>
</body>
</html>
